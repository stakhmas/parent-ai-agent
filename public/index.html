<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parent AI Agent</title>
    <style>
      :root {
        color-scheme: light;
        --bg-start: #f3f7ff;
        --bg-end: #fff4f7;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #6d5efc;
        --accent-2: #9f67ff;
        --ok: #12996f;
        --error: #d1345b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: min(760px, 100%);
        background: var(--card);
        border-radius: 20px;
        box-shadow: 0 18px 48px rgba(83, 72, 190, 0.16);
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.4rem, 2.1vw, 2rem);
      }

      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.5;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 0.9rem;
        margin-bottom: 18px;
        background: rgba(18, 153, 111, 0.1);
        color: var(--ok);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .profile-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
      }

      .field input,
      .field select {
        width: 100%;
        border: 1px solid #d2d8e8;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.95rem;
        font-family: inherit;
        background: #fff;
      }

      .field input:focus,
      .field select:focus {
        outline: 2px solid rgba(109, 94, 252, 0.28);
        border-color: #b7b1ff;
      }

      textarea {
        width: 100%;
        min-height: 110px;
        resize: vertical;
        border: 1px solid #d2d8e8;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 1rem;
        font-family: inherit;
      }

      textarea:focus {
        outline: 2px solid rgba(109, 94, 252, 0.28);
        border-color: #b7b1ff;
      }

      .actions {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        cursor: pointer;
        font-weight: 600;
        color: white;
        border-radius: 11px;
        padding: 11px 16px;
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.7;
      }

      .hint {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .output {
        margin-top: 18px;
        border: 1px solid #e5e9f2;
        border-radius: 14px;
        background: #fafbff;
        padding: 16px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .error {
        border-color: #ffd2dc;
        background: #fff6f8;
        color: var(--error);
      }

      .meta {
        color: var(--muted);
        margin-top: 10px;
        font-size: 0.86rem;
      }

      .divider {
        margin: 18px 0 16px;
        border: 0;
        border-top: 1px solid #e8ecf7;
      }

      .quick-prompts {
        margin-top: 14px;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .quick-btn {
        border: 1px solid #d7dcf0;
        background: #fff;
        color: #4a5575;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="status"><span class="dot"></span> API запущен</div>
      <h1>Parent AI Agent</h1>
      <p class="subtitle">
        Задайте вопрос про сон, режим или успокоение малыша. Если API-ключ не задан,
        приложение ответит в локальном mock-режиме.
      </p>

      <form id="chat-form">
        <label>Профиль семьи (для персональных ответов)</label>
        <div class="profile-grid">
          <div class="field">
            <input id="child-name" placeholder="Имя ребенка (например, Миша)" />
          </div>
          <div class="field">
            <input id="child-age" placeholder="Возраст (например, 8 месяцев)" />
          </div>
          <div class="field">
            <input id="sleep-challenges" placeholder="Главная сложность (частые пробуждения)" />
          </div>
          <div class="field">
            <input id="family-goal" placeholder="Цель на месяц (укладывание до 21:00)" />
          </div>
          <div class="field">
            <select id="parent-style">
              <option value="">Стиль общения помощника</option>
              <option value="кратко и по шагам">Кратко и по шагам</option>
              <option value="поддерживающе и мягко">Поддерживающе и мягко</option>
              <option value="подробно с объяснением причин">Подробно с объяснением причин</option>
            </select>
          </div>
          <div class="field">
            <input id="locale" placeholder="Контекст семьи (город, режим, язык дома)" />
          </div>
        </div>

        <span class="hint">Поля сохраняются локально в этом браузере.</span>
        <hr class="divider" />

        <label for="message">Ваш вопрос</label>
        <textarea
          id="message"
          name="message"
          placeholder="Например: как мягко выстроить ритуал перед сном?"
          required
        ></textarea>
        <div class="actions">
          <button type="submit" id="submit-btn">Спросить</button>
          <span class="hint" id="loading-hint"></span>
        </div>
      </form>

      <section class="quick-prompts">
        <label>Быстрые персональные темы</label>
        <div class="chip-row">
          <button class="quick-btn" type="button" data-prompt="Составь персональный вечерний ритуал на 15 минут.">Ритуал на вечер</button>
          <button class="quick-btn" type="button" data-prompt="Как уменьшить ночные пробуждения без жестких методов?">Ночные пробуждения</button>
          <button class="quick-btn" type="button" data-prompt="Дай мягкий план на 3 дня, чтобы меньше было истерик перед сном.">План на 3 дня</button>
        </div>
      </section>

      <section class="output" id="response-box">
        Ответ появится здесь после отправки вопроса.
      </section>
      <div class="meta" id="response-meta"></div>
    </main>

    <script>
      const form = document.getElementById("chat-form");
      const messageInput = document.getElementById("message");
      const responseBox = document.getElementById("response-box");
      const responseMeta = document.getElementById("response-meta");
      const submitBtn = document.getElementById("submit-btn");
      const loadingHint = document.getElementById("loading-hint");
      const quickPromptButtons = document.querySelectorAll(".quick-btn");
      const profileInputs = {
        childName: document.getElementById("child-name"),
        childAgeMonths: document.getElementById("child-age"),
        sleepChallenges: document.getElementById("sleep-challenges"),
        familyGoal: document.getElementById("family-goal"),
        parentStyle: document.getElementById("parent-style"),
        locale: document.getElementById("locale")
      };

      const PROFILE_STORAGE_KEY = "parent-ai-profile-v1";
      const SESSION_STORAGE_KEY = "parent-ai-session-v1";

      function getSessionId() {
        const existing = localStorage.getItem(SESSION_STORAGE_KEY);
        if (existing) {
          return existing;
        }
        const generated =
          (window.crypto && window.crypto.randomUUID && window.crypto.randomUUID()) ||
          `session-${Date.now()}`;
        localStorage.setItem(SESSION_STORAGE_KEY, generated);
        return generated;
      }

      function loadProfile() {
        try {
          const raw = localStorage.getItem(PROFILE_STORAGE_KEY);
          if (!raw) {
            return;
          }
          const saved = JSON.parse(raw);
          Object.entries(profileInputs).forEach(([key, input]) => {
            input.value = typeof saved[key] === "string" ? saved[key] : "";
          });
        } catch (_error) {
          localStorage.removeItem(PROFILE_STORAGE_KEY);
        }
      }

      function saveProfile() {
        const profile = Object.fromEntries(
          Object.entries(profileInputs).map(([key, input]) => [key, input.value.trim()])
        );
        localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(profile));
      }

      function getProfile() {
        return Object.fromEntries(
          Object.entries(profileInputs).map(([key, input]) => [key, input.value.trim()])
        );
      }

      function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        submitBtn.textContent = isLoading ? "Отправка..." : "Спросить";
        loadingHint.textContent = isLoading ? "Запрос выполняется" : "";
      }

      function setOutput(text, isError) {
        responseBox.textContent = text;
        responseBox.classList.toggle("error", Boolean(isError));
      }

      loadProfile();
      Object.values(profileInputs).forEach((input) => {
        input.addEventListener("change", saveProfile);
        input.addEventListener("blur", saveProfile);
      });

      quickPromptButtons.forEach((button) => {
        button.addEventListener("click", () => {
          messageInput.value = button.dataset.prompt || "";
          messageInput.focus();
        });
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = messageInput.value.trim();
        if (!message) {
          setOutput("Введите вопрос перед отправкой.", true);
          responseMeta.textContent = "";
          return;
        }

        setLoading(true);
        setOutput("Готовим ответ...", false);
        responseMeta.textContent = "";

        try {
          const profile = getProfile();
          saveProfile();
          const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message,
              profile,
              sessionId: getSessionId()
            })
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Ошибка запроса");
          }

          setOutput(data.reply || "Ответ пустой.", false);
          const childHint = profile.childName ? `Профиль: ${profile.childName}` : "Профиль: общий";
          responseMeta.textContent =
            data.mode === "mock"
              ? `Режим: локальный mock · ${childHint}`
              : `Режим: OpenAI API · ${childHint}`;
        } catch (error) {
          setOutput(error.message || "Не удалось получить ответ.", true);
          responseMeta.textContent = "Попробуйте повторить запрос.";
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
